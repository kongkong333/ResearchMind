<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResearchMind</title>
    <link rel="stylesheet" href="{{ styles_css_url }}">
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="sidebar-head">
            <div class="brand-block">
              <h1>ResearchMind</h1>
            </div>
            <button id="sidebarToggleButton" class="sidebar-toggle" type="button" aria-label="收缩侧边栏" aria-expanded="true">❮</button>
          </div>
          <nav class="sidebar-nav" aria-label="主导航">
            <button class="nav-item active" type="button" data-module="topic-analysis">主题论文分析</button>
            <button class="nav-item" type="button" data-module="conference-trends">会议论文近期趋势</button>
          </nav>
        </div>
        <div class="sidebar-footer">
          <button id="openSettingsButton" class="settings-button" type="button">设置</button>
        </div>
      </aside>

      <main class="content">
        <section id="topic-analysis-view" class="module-view">
          <section class="panel hero">
            <p class="eyebrow">主题论文分析</p>
            <h2>围绕研究主题抓取论文并生成报告</h2>
            <p class="hero-copy">选定数据库、时间范围与抓取数量，ResearchMind 自动论文抓取、筛选分析、趋势归纳与研究总结</p>
          </section>

          <section class="panel topic-panel">
            <div class="field field-wide">
              <span>数据库</span>
              <div id="databaseTabs" class="database-tabs" role="tablist" aria-label="论文数据库"></div>
            </div>
            <label class="field field-wide">
              <span>研究主题</span>
              <input id="topicInput" type="text" value="AI Agent" placeholder="例如：AI Agent / RAG / Multimodal">
            </label>
            <div class="topic-grid">
              <label class="field">
                <span>起始日期</span>
                <div class="date-picker-field">
                  <input id="startDateInput" type="text" inputmode="none" placeholder="yy/mm/dd" readonly>
                  <input id="startDatePicker" class="date-picker-native" type="date" aria-label="起始日期">
                </div>
              </label>
              <label class="field">
                <span>终止日期</span>
                <div class="date-picker-field">
                  <input id="endDateInput" type="text" inputmode="none" placeholder="yy/mm/dd" readonly>
                  <input id="endDatePicker" class="date-picker-native" type="date" aria-label="终止日期">
                </div>
              </label>
              <label class="field">
                <span>抓取数量</span>
                <input id="maxResultsInput" type="number" min="1" max="20" value="5">
              </label>
            </div>
            <p class="save-hint">单次请求最多抓取 20 篇论文，且只会在当前选中的数据库中抓取。</p>
            <button id="runButton" type="button">生成报告</button>
          </section>

          <section id="stage-grid" class="stage-grid"></section>
          <section id="result-panel" class="panel result-panel"></section>
        </section>

        <section id="conference-trends-view" class="module-view hidden">
          <section class="panel hero">
            <p class="eyebrow">会议论文近期趋势</p>
            <h2>抓取会议论文并归纳热点趋势</h2>
            <p class="hero-copy">按会议与年份抓取 accepted 标题，再交给大模型提炼方法热点、应用热点与值得关注的新信号。</p>
          </section>
          <section class="panel topic-panel conference-panel">
            <div class="conference-grid">
              <label class="field">
                <span>会议</span>
                <select id="conferenceSelect">
                  <option value="iclr">ICLR</option>
                  <option value="neurips">NeurIPS</option>
                  <option value="icml">ICML</option>
                  <option value="colm">COLM</option>
                  <option value="aaai">AAAI</option>
                  <option value="coling">COLING</option>
                  <option value="icme">ICME</option>
                </select>
              </label>
              <label class="field">
                <span>年份</span>
                <input id="conferenceYearInput" type="number" min="2013" max="2100" value="2025">
              </label>
              <label class="field">
                <span>论文数量</span>
                <input id="conferenceLimitInput" type="number" min="1" max="500" value="100">
              </label>
            </div>
            <section id="conferenceTrackSection" class="conference-track-section hidden">
              <div class="section-head">
                <div>
                  <p class="eyebrow">AAAI Tracks</p>
                  <span id="conferenceTrackHint" class="section-note">选择年份后将自动加载可选 track。</span>
                </div>
              </div>
              <div id="conferenceTrackList" class="conference-track-list"></div>
            </section>
            <button id="conferenceRunButton" type="button">开始趋势分析</button>
          </section>
          <section id="conference-stage-grid" class="stage-grid"></section>
          <section id="conference-result-panel" class="panel result-panel"></section>
        </section>
      </main>
    </div>

    <div id="settingsModal" class="modal-shell hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <section class="panel settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
        <div class="modal-head">
          <div>
            <p class="eyebrow">设置</p>
            <h2 id="settingsModalTitle">LLM 配置</h2>
          </div>
          <button id="closeSettingsButton" class="modal-close" type="button" aria-label="关闭设置">×</button>
        </div>
        <label class="field">
          <span>API Key</span>
          <input id="apiKey" type="password" autocomplete="off">
        </label>
        <label class="field">
          <span>模型名称</span>
          <input id="modelName" type="text" value="gpt-4.1-mini">
        </label>
        <label class="field">
          <span>API Base URL</span>
          <input id="baseUrl" type="text" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1">
        </label>
        <label class="field">
          <span>报告输出目录</span>
          <input id="reportDir" type="text" value="reports">
        </label>
        <p id="saveHint" class="save-hint">配置会自动保存</p>
      </section>
    </div>

    <script src="{{ selection_state_js_url }}"></script>
    <script src="{{ app_js_url }}"></script>
    <script src="{{ conference_trends_js_url }}"></script>
  </body>
</html>
